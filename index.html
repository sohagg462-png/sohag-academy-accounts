<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sohag Academy – Payment Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8c96d;
    --accent2: #c9a84c;
    --text: #f0ede6;
    --muted: #888;
    --paid: #4caf7d;
    --due: #e05252;
    --inactive: #888;
    --partial: #f0a443;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Libre Baskerville', serif; font-size: 1.2rem; color: var(--accent); letter-spacing: 0.5px; }
  .logo span { color: var(--muted); font-size: 0.75rem; display: block; font-family: 'DM Sans', sans-serif; font-weight: 300; }
  .header-actions { display: flex; gap: 8px; }

  /* NAV TABS */
  .tabs { display: flex; gap: 4px; padding: 12px 20px 0; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab { padding: 8px 16px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 0.82rem; font-weight: 500; color: var(--muted); background: transparent; border: none; white-space: nowrap; transition: all 0.2s; }
  .tab.active { background: var(--bg); color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* MAIN */
  .main { padding: 20px; max-width: 1100px; margin: 0 auto; }

  /* BUTTONS */
  .btn { padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #111; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: #3a1a1a; color: var(--due); border: 1px solid #5a2a2a; }
  .btn-danger:hover { background: #5a2020; }
  .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
  .btn-icon { padding: 6px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
  .btn-icon:hover { color: var(--accent); border-color: var(--accent); }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .card-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 6px; }
  .card-value { font-family: 'Libre Baskerville', serif; font-size: 1.6rem; color: var(--accent); }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }

  /* SECTION HEADER */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .section-title { font-family: 'Libre Baskerville', serif; font-size: 1.1rem; }

  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  th { background: var(--surface2); color: var(--muted); font-weight: 500; text-align: left; padding: 10px 14px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1f1f1f; }

  /* STATUS BADGES */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
  .badge-paid { background: #1a3a2a; color: var(--paid); }
  .badge-due { background: #3a1a1a; color: var(--due); }
  .badge-partial { background: #3a2a10; color: var(--partial); }
  .badge-inactive { background: #222; color: var(--inactive); border: 1px solid #333; }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 18px 20px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-family: 'Libre Baskerville', serif; font-size: 1rem; }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 2px 6px; }
  .close-btn:hover { color: var(--text); }

  /* FORM */
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; width: 100%; outline: none; transition: border 0.2s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 70px; }

  /* PRINT */
  @media print {
    body { background: #fff; color: #111; }
    .no-print { display: none !important; }
    .print-only { display: block !important; }
    .modal-bg { position: static; background: none; display: block; }
    .modal { box-shadow: none; border: none; max-height: none; }
    .receipt-print { padding: 0; }
  }
  .print-only { display: none; }

  /* RECEIPT */
  .receipt { background: #fff; color: #111; border-radius: 10px; padding: 28px; font-family: 'DM Sans', sans-serif; max-width: 420px; margin: 0 auto; }
  .receipt-logo { font-family: 'Libre Baskerville', serif; font-size: 1.3rem; color: #1a1a1a; text-align: center; border-bottom: 2px solid #e8c96d; padding-bottom: 10px; margin-bottom: 14px; }
  .receipt-logo small { display: block; font-family: 'DM Sans'; font-size: 0.72rem; color: #666; font-weight: 400; margin-top: 3px; }
  .receipt-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.85rem; border-bottom: 1px dashed #eee; }
  .receipt-row.total { font-weight: 700; font-size: 0.95rem; border-bottom: 2px solid #111; border-top: 2px solid #111; margin-top: 6px; padding: 8px 0; }
  .receipt-row.due-row { color: #e05252; font-weight: 600; }
  .receipt-footer { text-align: center; margin-top: 14px; font-size: 0.72rem; color: #999; }

  /* STUDENT DETAIL PANEL */
  .detail-panel { display: none; }
  .detail-panel.open { display: block; }
  .monthly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 10px; }
  .month-cell { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; text-align: center; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
  .month-cell:hover { border-color: var(--accent); }
  .month-cell .m-name { font-weight: 600; font-size: 0.8rem; }
  .month-cell .m-status { margin-top: 3px; }
  .month-cell.m-paid { border-color: var(--paid); background: #1a3a2a22; }
  .month-cell.m-due { border-color: var(--due); background: #3a1a1a22; }
  .month-cell.m-partial { border-color: var(--partial); background: #3a2a1022; }
  .month-cell.m-inactive { opacity: 0.4; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }

  /* SEARCH */
  .search-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); font-family: 'DM Sans'; font-size: 0.85rem; width: 100%; max-width: 240px; outline: none; }
  .search-bar:focus { border-color: var(--accent); }

  /* CHIP */
  .chip { display: inline-flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 0.75rem; color: var(--muted); }

  /* MONTH SELECTOR */
  .month-nav { display: flex; align-items: center; gap: 12px; }
  .month-nav select { width: auto; padding: 6px 10px; }

  /* LOADING */
  .loader { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .main { padding: 12px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    th, td { padding: 8px 10px; }
    .card-value { font-size: 1.3rem; }
  }

  /* NOTIFICATION */
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; padding: 12px 18px; font-size: 0.85rem; z-index: 999; animation: slideUp 0.3s ease; max-width: 280px; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  .text-paid { color: var(--paid); }
  .text-due { color: var(--due); }
  .text-partial { color: var(--partial); }
  .text-muted { color: var(--muted); }
  .text-accent { color: var(--accent); }

  .row-actions { display: flex; gap: 4px; }
  .expand-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; padding: 4px; transition: color 0.2s; }
  .expand-btn:hover { color: var(--accent); }

  .student-detail-row td { padding: 0; background: #161616; }
  .student-detail-inner { padding: 16px 20px; border-top: 1px solid var(--border); }

  /* YEAR TOGGLE */
  .year-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .year-tab { padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 0.78rem; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); transition: all 0.2s; }
  .year-tab.active { background: var(--accent); color: #111; border-color: var(--accent); }

  /* PAYMENT LOG */
  .payment-log { margin-top: 12px; }
  .log-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .log-item:last-child { border-bottom: none; }
</style>
</head>
<body>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, updateDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ========================
// 🔥 FIREBASE CONFIG — REPLACE WITH YOUR OWN
// ========================
const firebaseConfig = {
  apiKey: "AIzaSyCHGp-2UEeDdJUFqy-C24MefYFcYzZjwz0",
  authDomain: "sohag-academy-accounts.firebaseapp.com",
  projectId: "sohag-academy-accounts",
  storageBucket: "sohag-academy-accounts.firebasestorage.app",
  messagingSenderId: "178352994926",
  appId: "1:178352994926:web:98eed7dd18dee37f4ac47f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ========================
// STATE
// ========================
let state = {
  classes: {},      // id -> { name, monthlyFee }
  students: {},     // id -> { name, classId, joinDate, notes }
  payments: {},     // id -> { studentId, month, year, amount, paidDate, status, note }
  activeTab: 'dashboard',
  currentMonth: new Date().getMonth(),
  currentYear: new Date().getFullYear(),
  expandedStudent: null,
  expandedYear: new Date().getFullYear(),
};

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ========================
// FIRESTORE HELPERS
// ========================
async function loadAll() {
  showLoader(true);
  try {
    const [classSnap, studSnap, paySnap] = await Promise.all([
      getDocs(collection(db, 'classes')),
      getDocs(collection(db, 'students')),
      getDocs(collection(db, 'payments')),
    ]);
    state.classes = {};
    classSnap.forEach(d => state.classes[d.id] = d.data());
    state.students = {};
    studSnap.forEach(d => state.students[d.id] = d.data());
    state.payments = {};
    paySnap.forEach(d => state.payments[d.id] = d.data());
    render();
  } catch(e) {
    alert('Firebase error: ' + e.message + '\n\nPlease update Firebase config in the HTML file.');
  }
  showLoader(false);
}

async function saveClass(id, data) { await setDoc(doc(db,'classes',id), data); state.classes[id]=data; }
async function deleteClass(id) { await deleteDoc(doc(db,'classes',id)); delete state.classes[id]; }
async function saveStudent(id, data) { await setDoc(doc(db,'students',id), data); state.students[id]=data; }
async function deleteStudent(id) { await deleteDoc(doc(db,'students',id)); delete state.students[id]; }
async function savePayment(id, data) { await setDoc(doc(db,'payments',id), data); state.payments[id]=data; }
async function deletePayment(id) { await deleteDoc(doc(db,'payments',id)); delete state.payments[id]; }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ========================
// COMPUTED HELPERS
// ========================
function getClassFee(classId) { return state.classes[classId]?.monthlyFee || 0; }
function getStudentClass(studentId) { return state.students[studentId]?.classId; }

function getPaymentKey(studentId, month, year) {
  return Object.keys(state.payments).find(id => {
    const p = state.payments[id];
    return p.studentId === studentId && p.month === month && p.year === year;
  });
}

function getStudentPayments(studentId) {
  return Object.entries(state.payments)
    .filter(([,p]) => p.studentId === studentId)
    .map(([id,p]) => ({id,...p}))
    .sort((a,b) => a.year !== b.year ? a.year-b.year : a.month-b.month);
}

// Calculate cumulative due for a student up to given month/year
function calcStudentDue(studentId) {
  const student = state.students[studentId];
  if (!student) return 0;
  const fee = getClassFee(student.classId);
  const payments = getStudentPayments(studentId);

  // Find active months (non-inactive)
  // total due = sum of all non-inactive months fee - sum of all payments
  let totalBilled = 0;
  let totalPaid = 0;

  payments.forEach(p => {
    if (p.status !== 'inactive') {
      totalBilled += fee;
    }
    totalPaid += (p.amount || 0);
  });

  return totalBilled - totalPaid;
}

// Get payment for specific month
function getMonthPaymentStatus(studentId, month, year) {
  const key = getPaymentKey(studentId, month, year);
  if (!key) return null;
  return state.payments[key];
}

function getClassStudents(classId) {
  return Object.entries(state.students)
    .filter(([,s]) => s.classId === classId)
    .map(([id,s]) => ({id,...s}));
}

// Monthly collection stats for a class
function getMonthlyStats(month, year) {
  let totalExpected = 0, totalCollected = 0, totalDue = 0;
  Object.keys(state.students).forEach(sid => {
    const student = state.students[sid];
    const fee = getClassFee(student.classId);
    const p = getMonthPaymentStatus(sid, month, year);
    if (!p || p.status === 'due') {
      totalExpected += fee;
      totalDue += fee;
    } else if (p.status === 'inactive') {
      // not counted
    } else if (p.status === 'paid') {
      totalExpected += fee;
      totalCollected += fee;
    } else if (p.status === 'partial') {
      totalExpected += fee;
      totalCollected += (p.amount || 0);
      totalDue += fee - (p.amount || 0);
    }
  });
  return { totalExpected, totalCollected, totalDue };
}

// ========================
// RENDER ENGINE
// ========================
function render() {
  const root = document.getElementById('app');
  root.innerHTML = `
    ${renderHeader()}
    ${renderTabs()}
    <div class="main">${renderPage()}</div>
    ${renderModals()}
  `;
  attachHandlers();
}

function renderHeader() {
  return `
  <div class="header no-print">
    <div class="logo">Sohag Academy <span>Payment Manager</span></div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" onclick="showTab('settings')">⚙️ Settings</button>
    </div>
  </div>`;
}

function renderTabs() {
  const tabs = [
    { id: 'dashboard', label: '📊 Dashboard' },
    { id: 'classes', label: '📚 Classes' },
    { id: 'students', label: '👥 Students' },
    { id: 'payments', label: '💰 Payments' },
  ];
  return `<div class="tabs no-print">${tabs.map(t =>
    `<button class="tab ${state.activeTab===t.id?'active':''}" onclick="showTab('${t.id}')">${t.label}</button>`
  ).join('')}</div>`;
}

function renderPage() {
  if (state.activeTab === 'dashboard') return renderDashboard();
  if (state.activeTab === 'classes') return renderClasses();
  if (state.activeTab === 'students') return renderStudents();
  if (state.activeTab === 'payments') return renderPayments();
  if (state.activeTab === 'settings') return renderSettings();
  return '';
}

// ========================
// DASHBOARD
// ========================
function renderDashboard() {
  const m = state.currentMonth, y = state.currentYear;
  const stats = getMonthlyStats(m, y);
  const totalStudents = Object.keys(state.students).length;
  const totalClasses = Object.keys(state.classes).length;

  // Students with due this month
  let dueStudents = [];
  Object.entries(state.students).forEach(([id, s]) => {
    const p = getMonthPaymentStatus(id, m, y);
    if (!p || p.status === 'due' || p.status === 'partial') {
      dueStudents.push({id,...s});
    }
  });

  return `
  <div class="section-header">
    <div class="section-title">Dashboard</div>
    <div class="month-nav">
      <button class="btn-icon" onclick="prevMonth()">◀</button>
      <select onchange="setMonthYear(this.value)" style="width:auto;padding:6px 10px;">
        ${MONTHS.map((mn,i) => `<option value="${i}_${y}" ${i===m?'selected':''}>${mn} ${y}</option>`).join('')}
        ${MONTHS.map((mn,i) => `<option value="${i}_${y-1}" ${i===m&&false?'selected':''}>${mn} ${y-1}</option>`).join('')}
      </select>
      <button class="btn-icon" onclick="nextMonth()">▶</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="card">
      <div class="card-title">Total Students</div>
      <div class="card-value">${totalStudents}</div>
    </div>
    <div class="card">
      <div class="card-title">Classes</div>
      <div class="card-value">${totalClasses}</div>
    </div>
    <div class="card">
      <div class="card-title">Collected (${MONTHS_SHORT[m]})</div>
      <div class="card-value text-paid">৳${stats.totalCollected.toLocaleString()}</div>
    </div>
    <div class="card">
      <div class="card-title">Total Due (${MONTHS_SHORT[m]})</div>
      <div class="card-value text-due">৳${stats.totalDue.toLocaleString()}</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;flex-wrap:wrap;">
    <!-- Class-wise monthly summary -->
    <div style="grid-column:1/-1">
      <div class="section-header"><div class="section-title" style="font-size:0.95rem;">📚 Class-wise ${MONTHS[m]} Collection</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Class</th><th>Fee/Student</th><th>Students</th><th>Collected</th><th>Due</th><th>Inactive</th></tr></thead>
          <tbody>
            ${Object.entries(state.classes).map(([cid,cls]) => {
              const students = getClassStudents(cid);
              let collected = 0, due = 0, inactive = 0;
              students.forEach(s => {
                const p = getMonthPaymentStatus(s.id, m, y);
                if (p?.status === 'inactive') inactive++;
                else if (p?.status === 'paid') collected += cls.monthlyFee;
                else if (p?.status === 'partial') { collected += (p.amount||0); due += cls.monthlyFee-(p.amount||0); }
                else due += cls.monthlyFee;
              });
              return `<tr>
                <td><strong>${cls.name}</strong></td>
                <td>৳${cls.monthlyFee?.toLocaleString()}</td>
                <td>${students.length}</td>
                <td class="text-paid">৳${collected.toLocaleString()}</td>
                <td class="text-due">৳${due.toLocaleString()}</td>
                <td class="text-muted">${inactive}</td>
              </tr>`;
            }).join('') || `<tr><td colspan="6" class="empty">No classes yet</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Due students this month -->
    <div style="grid-column:1/-1">
      <div class="section-header"><div class="section-title" style="font-size:0.95rem;">⚠️ Due / Unpaid — ${MONTHS[m]} ${y}</div></div>
      ${dueStudents.length === 0 ? `<div class="card" style="text-align:center;color:var(--paid);padding:20px;">✅ All payments collected for ${MONTHS[m]}!</div>` : `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Student</th><th>Class</th><th>Monthly Fee</th><th>Paid</th><th>Remaining</th><th>Action</th></tr></thead>
          <tbody>
            ${dueStudents.map(s => {
              const p = getMonthPaymentStatus(s.id, m, y);
              const fee = getClassFee(s.classId);
              const paid = p?.amount || 0;
              return `<tr>
                <td>${s.name}</td>

function renderStudentDetail(studentId) {
  const student = state.students[studentId];
  if (!student) return '';
  const fee = getClassFee(student.classId);
  const payments = getStudentPayments(studentId);
  const year = state.expandedYear;

  // Build month data for the year
  const monthData = MONTHS.map((mn, i) => {
    const p = payments.find(p => p.month === i && p.year === year);
    return { month: i, name: mn, short: MONTHS_SHORT[i], payment: p };
  });

  // Yearly stats
  let yearCollected = 0, yearDue = 0, yearInactive = 0;
  monthData.forEach(md => {
    if (md.payment?.status === 'paid') yearCollected += fee;
    else if (md.payment?.status === 'partial') { yearCollected += md.payment.amount||0; yearDue += fee-(md.payment.amount||0); }
    else if (md.payment?.status === 'inactive') yearInactive++;
    else yearDue += fee;
  });

  // Get distinct years from payments
  const years = [...new Set(payments.map(p => p.year))];
  if (!years.includes(year)) years.push(year);
  years.sort((a,b) => b-a);

  return `<div class="student-detail-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <div style="font-size:0.85rem;font-weight:600;">📅 Yearly Payment History — <span style="color:var(--accent)">${student.name}</span></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="year-tabs">${years.map(yr => `<div class="year-tab ${yr===year?'active':''}" onclick="setExpandYear('${studentId}',${yr})">${yr}</div>`).join('')}</div>
        <button class="btn btn-ghost btn-sm" onclick="printReceipt('${studentId}','${state.currentMonth}','${state.currentYear}')">🖨️ Receipt</button>
      </div>
    </div>

    <div style="display:flex;gap:20px;margin-bottom:12px;flex-wrap:wrap;">
      <div><span class="text-muted" style="font-size:0.75rem;">Collected ${year}</span><br><strong class="text-paid">৳${yearCollected.toLocaleString()}</strong></div>
      <div><span class="text-muted" style="font-size:0.75rem;">Due ${year}</span><br><strong class="text-due">৳${yearDue.toLocaleString()}</strong></div>
      <div><span class="text-muted" style="font-size:0.75rem;">Inactive Months</span><br><strong class="text-muted">${yearInactive}</strong></div>
    </div>

    <div class="monthly-grid">
      ${monthData.map(md => {
        const st = md.payment?.status || 'due';
        const amt = md.payment?.amount || 0;
        let statusLabel = st === 'paid' ? '✓ Paid' : st === 'partial' ? `৳${amt}` : st === 'inactive' ? '— Off' : '✗ Due';
        return `<div class="month-cell m-${st}" onclick="openPayModal('${studentId}','${md.month}','${year}')">
          <div class="m-name">${md.short}</div>
          <div class="m-status">
            ${st === 'paid' ? `<span class="badge badge-paid">${statusLabel}</span>` :
              st === 'partial' ? `<span class="badge badge-partial">${statusLabel}</span>` :
              st === 'inactive' ? `<span class="badge badge-inactive">${statusLabel}</span>` :
              `<span class="badge badge-due">${statusLabel}</span>`}
          </div>
          ${md.payment?.paidDate ? `<div style="font-size:0.68rem;color:var(--muted);margin-top:3px;">${md.payment.paidDate}</div>` : ''}
        </div>`;
      }).join('')}
    </div>

    <div class="payment-log" style="margin-top:16px;">
      <div style="font-size:0.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Payment Log ${year}</div>
      ${monthData.filter(md => md.payment).map(md => `
        <div class="log-item">
          <div>
            <strong>${md.name}</strong>
            ${md.payment.paidDate ? `<span class="text-muted" style="font-size:0.75rem;margin-left:8px;">${md.payment.paidDate}</span>` : ''}
            ${md.payment.note ? `<div style="font-size:0.72rem;color:var(--muted)">${md.payment.note}</div>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            ${md.payment.status === 'paid' ? `<span class="badge badge-paid">Paid ৳${fee.toLocaleString()}</span>` :
              md.payment.status === 'partial' ? `<span class="badge badge-partial">Partial ৳${md.payment.amount?.toLocaleString()}</span>` :
              md.payment.status === 'inactive' ? `<span class="badge badge-inactive">Inactive</span>` :
              `<span class="badge badge-due">Due</span>`}
            <button class="btn-icon" onclick="openPayModal('${studentId}','${md.month}','${year}')" title="Edit">✏️</button>
          </div>
        </div>
      `).join('') || `<div style="color:var(--muted);font-size:0.82rem;padding:10px 0;">No payment records for ${year}</div>`}
    </div>
  </div>`;
}

// ========================
// MODAL HANDLERS
// ========================
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

window.openClassModal = function(id) {
  document.getElementById('classModalTitle').textContent = id ? 'Edit Class' : 'Add Class';
  document.getElementById('classId').value = id || '';
  document.getElementById('className').value = id ? (state.classes[id]?.name || '') : '';
  document.getElementById('classFee').value = id ? (state.classes[id]?.monthlyFee || '') : '';
  openModal('classModal');
};

window.saveClassForm = async function() {
  const id = document.getElementById('classId').value || uid();
  const name = document.getElementById('className').value.trim();
  const fee = parseInt(document.getElementById('classFee').value);
  if (!name || isNaN(fee)) { toast('Please fill all fields'); return; }
  await saveClass(id, { name, monthlyFee: fee });
  closeModal('classModal');
  render();
  toast('Class saved!');
};

window.confirmDeleteClass = function(id) {
  document.getElementById('confirmText').textContent = `Delete class "${state.classes[id]?.name}"? This won't delete students.`;
  document.getElementById('confirmOkBtn').onclick = async () => {
    await deleteClass(id);
    closeModal('confirmModal');
    render();
    toast('Class deleted');
  };
  openModal('confirmModal');
};

window.openStudentModal = function(id) {
  document.getElementById('studentModalTitle').textContent = id ? 'Edit Student' : 'Add Student';
  document.getElementById('studentId').value = id || '';
  document.getElementById('studentName').value = id ? (state.students[id]?.name || '') : '';
  document.getElementById('studentNotes').value = id ? (state.students[id]?.notes || '') : '';
  const sel = document.getElementById('studentClass');
  if (sel) {
    sel.innerHTML = `<option value="">-- Select Class --</option>` +
      Object.entries(state.classes).map(([cid,c]) => `<option value="${cid}" ${id && state.students[id]?.classId===cid?'selected':''}>${c.name}</option>`).join('');
  }
  openModal('studentModal');
};

window.saveStudentForm = async function() {
  const id = document.getElementById('studentId').value || uid();
  const name = document.getElementById('studentName').value.trim();
  const classId = document.getElementById('studentClass').value;
  const notes = document.getElementById('studentNotes').value.trim();
  if (!name || !classId) { toast('Please fill student name and class'); return; }
  await saveStudent(id, { name, classId, notes, joinDate: state.students[id]?.joinDate || new Date().toISOString().slice(0,10) });
  closeModal('studentModal');
  render();
  toast('Student saved!');
};

window.confirmDeleteStudent = function(id) {
  document.getElementById('confirmText').textContent = `Delete student "${state.students[id]?.name}"? Their payment history will also be removed.`;
  document.getElementById('confirmOkBtn').onclick = async () => {
    // delete all payments for student
    const payIds = Object.keys(state.payments).filter(pid => state.payments[pid].studentId === id);
    for (const pid of payIds) await deletePayment(pid);
    await deleteStudent(id);
    closeModal('confirmModal');
    render();
    toast('Student deleted');
  };
  openModal('confirmModal');
};

window.openPayModal = function(studentId, month, year) {
  month = parseInt(month); year = parseInt(year);
  const student = state.students[studentId];
  const fee = getClassFee(student?.classId);
  document.getElementById('payStudentId').value = studentId;
  document.getElementById('payMonth').value = month;
  document.getElementById('payYear').value = year;
  document.getElementById('payModalTitle').textContent = `Payment — ${student?.name} (${MONTHS[month]} ${year})`;

  const runningDue = calcStudentDue(studentId);
  document.getElementById('payStudentInfo').innerHTML = `
    <strong>${student?.name}</strong> &nbsp;|&nbsp; ${state.classes[student?.classId]?.name || '?'}
    <br><span style="color:var(--muted);">Monthly Fee: ৳${fee.toLocaleString()}</span>
    ${runningDue > 0 ? `&nbsp;&nbsp;<span style="color:var(--due);">Running Due: ৳${runningDue.toLocaleString()}</span>` : ''}
  `;

  const existing = getMonthPaymentStatus(studentId, month, year);
  document.getElementById('payStatus').value = existing?.status || 'paid';
  document.getElementById('payAmount').value = existing?.amount || (existing?.status === 'paid' ? fee : '');
  document.getElementById('payDate').value = existing?.paidDate || new Date().toISOString().slice(0,10);
  document.getElementById('payNote').value = existing?.note || '';
  updatePayAmountVisibility();
  openModal('payModal');
};

window.updatePayAmountVisibility = function() {
  const status = document.getElementById('payStatus').value;
  const amtGroup = document.getElementById('payAmountGroup');
  const summaryDiv = document.getElementById('payDueSummary');
  if (status === 'partial') {
    amtGroup.style.display = '';
    // Show due summary
    const studentId = document.getElementById('payStudentId').value;
    const fee = getClassFee(state.students[studentId]?.classId);
    const amt = parseInt(document.getElementById('payAmount').value) || 0;
    summaryDiv.style.display = 'block';
    summaryDiv.innerHTML = `⚠️ Partial payment. This month's remaining: <strong>৳${(fee-amt).toLocaleString()}</strong>`;
  } else if (status === 'paid') {
    amtGroup.style.display = '';
    summaryDiv.style.display = 'none';
    const studentId = document.getElementById('payStudentId').value;
    const fee = getClassFee(state.students[studentId]?.classId);
    document.getElementById('payAmount').value = fee;
  } else {
    amtGroup.style.display = 'none';
    summaryDiv.style.display = 'none';
  }
};

window.savePaymentForm = async function() {
  const studentId = document.getElementById('payStudentId').value;
  const month = parseInt(document.getElementById('payMonth').value);
  const year = parseInt(document.getElementById('payYear').value);
  const status = document.getElementById('payStatus').value;
  const fee = getClassFee(state.students[studentId]?.classId);
  let amount = parseFloat(document.getElementById('payAmount').value) || 0;
  const paidDate = document.getElementById('payDate').value;
  const note = document.getElementById('payNote').value.trim();

  if (status === 'paid') amount = fee;
  if (status === 'inactive' || status === 'due') amount = 0;

  const existingId = getPaymentKey(studentId, month, year);
  const id = existingId || uid();
  await savePayment(id, { studentId, month, year, status, amount, paidDate, note });
  closeModal('payModal');
  render();
  toast('Payment saved!');
};

// ========================
// RECEIPT
// ========================
window.printReceipt = function(studentId, month, year) {
  month = parseInt(month); year = parseInt(year);
  const student = state.students[studentId];
  if (!student) return;
  const fee = getClassFee(student.classId);
  const p = getMonthPaymentStatus(studentId, month, year);
  const runningDue = calcStudentDue(studentId);
  const allPayments = getStudentPayments(studentId);
  const activeMonths = allPayments.filter(p => p.status !== 'inactive').length;

  // Previous due (before this month's payment)
  const thisMonthPaid = p?.amount || 0;
  const previousDue = runningDue; // current due including this month

  document.getElementById('receiptContent').innerHTML = `
  <div class="receipt">
    <div class="receipt-logo">
      Sohag Academy
      <small>Official Payment Receipt</small>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#666;margin-bottom:14px;">
      <span>Receipt Date: ${p?.paidDate || new Date().toISOString().slice(0,10)}</span>
      <span>Receipt #${studentId.slice(-4).toUpperCase()}-${month+1}${year}</span>
    </div>
    <div class="receipt-row"><span>Student Name</span><strong>${student.name}</strong></div>
    <div class="receipt-row"><span>Class</span><strong>${state.classes[student.classId]?.name || '?'}</strong></div>
    <div class="receipt-row"><span>Month</span><strong>${MONTHS[month]} ${year}</strong></div>
    <div class="receipt-row"><span>Active Months</span><strong>${activeMonths} months</strong></div>
    <hr style="border:none;border-top:1px dashed #ddd;margin:8px 0;">
    <div class="receipt-row"><span>Monthly Fee</span><span>৳${fee.toLocaleString()}</span></div>
    <div class="receipt-row"><span>Amount Paid (This Month)</span><span>৳${thisMonthPaid.toLocaleString()}</span></div>
    <div class="receipt-row total"><span>Payment Status</span>
      <span>${p?.status === 'paid' ? '✅ Paid' : p?.status === 'partial' ? '⚡ Partial' : p?.status === 'inactive' ? '⏸ Inactive' : '❌ Due'}</span>
    </div>
    ${runningDue > 0 ? `<div class="receipt-row due-row"><span>⚠️ Total Running Due</span><strong>৳${runningDue.toLocaleString()}</strong></div>` : `<div class="receipt-row" style="color:#4caf7d;"><span>✅ No Pending Due</span><strong>Clear</strong></div>`}
    ${p?.note ? `<div class="receipt-row"><span>Note</span><span>${p.note}</span></div>` : ''}
    <div class="receipt-footer">
      Thank you for your payment!<br>
      Sohag Academy — ${new Date().getFullYear()}
    </div>
  </div>`;
  openModal('receiptModal');
};

// ========================
// NAVIGATION & FILTERS
// ========================
window.showTab = function(tab) {
  state.activeTab = tab;
  render();
};
window.prevMonth = function() {
  if (state.currentMonth === 0) { state.currentMonth = 11; state.currentYear--; }
  else state.currentMonth--;
  render();
};
window.nextMonth = function() {
  if (state.currentMonth === 11) { state.currentMonth = 0; state.currentYear++; }
  else state.currentMonth++;
  render();
};
window.setMonthYear = function(val) {
  const [m, y] = val.split('_').map(Number);
  state.currentMonth = m; state.currentYear = y;
  render();
};
window.filterStudentClass = function(val) {
  state.studentClassFilter = val;
  render();
};
window.filterPayClass = function(val) {
  state.payClassFilter = val;
  render();
};
window.toggleStudent = function(id) {
  state.expandedStudent = state.expandedStudent === id ? null : id;
  state.expandedYear = new Date().getFullYear();
  render();
};
window.setExpandYear = function(studentId, year) {
  state.expandedYear = year;
  render();
};

// ========================
// TOAST
// ========================
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ========================
// LOADER
// ========================
function showLoader(show) {
  let el = document.getElementById('globalLoader');
  if (!el) {
    el = document.createElement('div');
    el.id = 'globalLoader';
    el.className = 'loader';
    el.innerHTML = '⏳ Loading data...';
    document.getElementById('app').innerHTML = '';
    document.getElementById('app').appendChild(el);
  }
  el.style.display = show ? 'block' : 'none';
}

function attachHandlers() {
  // amount field live update for partial
  const amtInput = document.getElementById('payAmount');
  if (amtInput) {
    amtInput.addEventListener('input', () => {
      const status = document.getElementById('payStatus')?.value;
      if (status === 'partial') {
        const studentId = document.getElementById('payStudentId').value;
        const fee = getClassFee(state.students[studentId]?.classId);
        const amt = parseInt(amtInput.value) || 0;
        const summaryDiv = document.getElementById('payDueSummary');
        if (summaryDiv) {
          summaryDiv.style.display = 'block';
          summaryDiv.innerHTML = `⚠️ Partial payment. Remaining this month: <strong>৳${(fee-amt).toLocaleString()}</strong>`;
        }
      }
    });
  }
}

// ========================
// INIT
// ========================
document.getElementById('app').innerHTML = `<div class="loader">⏳ Connecting to Firebase...</div>`;
loadAll();
</script>

<div id="app"></div>
